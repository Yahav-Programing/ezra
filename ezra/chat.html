<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>עזרא - צ'אט</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{
  font-family:'Segoe UI',Roboto,sans-serif;
  background:#202124;color:#e8eaed;
  display:flex;flex-direction:column;height:100vh;
  transition:background .3s,color .3s;
}
body.light{background:#f0f0f0;color:#202124;}

/* Particle canvas sits behind everything */
#canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

#chatContainer{
  flex:1;overflow-y:auto;padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;position:relative;z-index:1;
}
#chatContainer::-webkit-scrollbar{width:4px;}
#chatContainer::-webkit-scrollbar-thumb{background:#555;border-radius:4px;}

/* Message enter animation */
.message{
  max-width:75%;padding:12px 16px;border-radius:18px;
  word-wrap:break-word;white-space:pre-wrap;line-height:1.5;font-size:15px;
  opacity:0;transform:translateY(12px) scale(0.97);
  animation:popin .28s cubic-bezier(.22,1,.36,1) forwards;
  position:relative;overflow:visible;
  width:fit-content;
  word-break:break-word;
}
@keyframes popin{to{opacity:1;transform:none;}}

.message::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:rgba(255,255,255,0);transition:background .25s;pointer-events:none;
}
.message:hover::after{background:rgba(255,255,255,0.06);}

.user{align-self:flex-end;background:#0b93f6;color:#fff;border-bottom-right-radius:4px;}
.bot{align-self:flex-start;background:#303134;color:#e8eaed;border-bottom-left-radius:4px;}
body.light .bot{background:#e0e0e0;color:#202124;}

/* Typing dots */
.dot{display:inline-block;width:7px;height:7px;margin:0 2px;
     background:#e8eaed;border-radius:50%;animation:blink 1s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
body.light .dot{background:#555;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}

/* Typing indicator styling */
.typing-indicator{
  display:flex;align-items:center;gap:4px;padding:12px 16px;
}

/* Input bar */
#inputContainer{
  display:flex;padding:10px 14px;border-top:1px solid #383838;
  background:#202124;gap:8px;align-items:center;
  position:relative;z-index:2;flex-shrink:0;
  transition:background .3s,border-color .3s;
}
body.light #inputContainer{background:#f0f0f0;border-top-color:#ddd;}

/* Buttons container */
#buttonsContainer{
  display:flex;padding:8px 12px;border-top:1px solid #383838;
  background:#202124;gap:8px;align-items:center;justify-content:center;
  position:relative;z-index:2;flex-shrink:0;
  flex-wrap:wrap;
  transition:background .3s,border-color .3s;
}
body.light #buttonsContainer{background:#f0f0f0;border-top-color:#ddd;}

/* Action buttons */
.action-btn{
  padding:10px 16px;border-radius:20px;border:1px solid #444;
  background:#2a2a2e;color:#e8eaed;cursor:pointer;font-size:14px;
  font-family:'Segoe UI',sans-serif;font-weight:500;
  transition:all .2s;flex-grow:1;min-width:100px;
  text-align:center;
}
.action-btn:hover{background:#3a3a3e;border-color:#0b93f6;transform:translateY(-2px);}
.action-btn:active{transform:translateY(0);}
body.light .action-btn{background:#fff;border-color:#ccc;color:#202124;}
body.light .action-btn:hover{background:#f5f5f5;border-color:#0b93f6;}

#userInput{
  flex:1;min-width:0;padding:12px 18px;border-radius:25px;
  border:1px solid #444;background:#2a2a2e;color:#e8eaed;
  font-size:16px;outline:none;
  transition:border-color .2s,box-shadow .2s,background .3s;
}
#userInput:focus{border-color:#0b93f6;box-shadow:0 0 0 3px rgba(11,147,246,.15);}
body.light #userInput{background:#fff;color:#202124;border-color:#ccc;}
body.light #userInput:focus{border-color:#0b93f6;}

/* Round send button */
#sendBtn{
  width:46px;height:46px;border-radius:50%;border:none;
  background:#0b93f6;color:#fff;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  transition:transform .15s,background .2s;
}
#sendBtn:hover:not(:disabled){background:#0872c6;transform:scale(1.07);}
#sendBtn:active:not(:disabled){transform:scale(0.91);}
#sendBtn:disabled{opacity:.4;cursor:default;}

/* Ripple */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.35);
  transform:scale(0);animation:rip .5s linear forwards;
  pointer-events:none;width:46px;height:46px;left:0;top:0;
}
@keyframes rip{to{transform:scale(4);opacity:0;}}

#themeToggle{
  width:38px;height:38px;border-radius:50%;border:1px solid #444;
  background:transparent;color:#e8eaed;cursor:pointer;font-size:16px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
#themeToggle:hover{background:#303134;}
body.light #themeToggle{color:#202124;border-color:#bbb;}
body.light #themeToggle:hover{background:#ddd;}

.games-dialog{
  border:none;
  padding:0;
  width:min(420px,calc(100vw - 28px));
  max-height:min(80vh,620px);
  border-radius:24px;
  background:#202124;
  color:#e8eaed;
  box-shadow:0 24px 70px rgba(0,0,0,.45);
}
.games-dialog::backdrop{background:rgba(0,0,0,.55);}
body.light .games-dialog{background:#f0f0f0;color:#202124;}

.games-dialog-card{
  display:flex;flex-direction:column;gap:14px;
  padding:20px;
}

.games-dialog-header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}

.games-dialog-title{
  font-size:20px;font-weight:600;
}

.games-dialog-close{
  width:38px;height:38px;border-radius:50%;border:1px solid #444;
  background:transparent;color:#e8eaed;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.games-dialog-close:hover{background:#303134;}
body.light .games-dialog-close{color:#202124;border-color:#bbb;}
body.light .games-dialog-close:hover{background:#ddd;}

.games-dialog-text{
  color:#9aa0a6;font-size:14px;line-height:1.5;
}
body.light .games-dialog-text{color:#5f6368;}

.games-dialog-list{
  display:flex;flex-direction:column;gap:10px;
  max-height:340px;overflow-y:auto;padding-right:2px;
}

.game-option-btn{
  width:100%;padding:14px 16px;border-radius:18px;border:1px solid #444;
  background:#2a2a2e;color:#e8eaed;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:4px;
  transition:all .2s;
}
.game-option-btn:hover{background:#3a3a3e;border-color:#0b93f6;transform:translateY(-1px);}
body.light .game-option-btn{background:#fff;border-color:#ccc;color:#202124;}
body.light .game-option-btn:hover{background:#f5f5f5;border-color:#0b93f6;}

.game-option-name{
  font-size:15px;font-weight:600;
}

.game-option-desc{
  color:#9aa0a6;font-size:13px;line-height:1.4;
}
body.light .game-option-desc{color:#5f6368;}

.games-dialog-actions{
  display:flex;justify-content:flex-end;
}

.games-dialog-cancel{
  padding:10px 16px;border-radius:20px;border:1px solid #444;
  background:#2a2a2e;color:#e8eaed;cursor:pointer;font-size:14px;
}
.games-dialog-cancel:hover{background:#3a3a3e;border-color:#0b93f6;}
body.light .games-dialog-cancel{background:#fff;border-color:#ccc;color:#202124;}
body.light .games-dialog-cancel:hover{background:#f5f5f5;border-color:#0b93f6;}

/* Responsive tweaks */
@media(max-width:480px){
  .message{max-width:88%;font-size:14px;}
  #userInput{font-size:15px;}
  #chatContainer{padding:10px 10px;}
}
@media(max-width:320px){
  .message{max-width:95%;}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="chatContainer"></div>
<div id="clockContainer" style="display:none;"></div>

<dialog id="gamesDialog" class="games-dialog">
  <div class="games-dialog-card">
    <div class="games-dialog-header">
      <div class="games-dialog-title">בחירת משחק</div>
      <button id="closeGamesDialogBtn" class="games-dialog-close" type="button">×</button>
    </div>
    <div id="gamesDialogText" class="games-dialog-text">בחרו משחק מהרשימה.</div>
    <div id="gamesDialogList" class="games-dialog-list"></div>
    <div class="games-dialog-actions">
      <button id="cancelGamesDialogBtn" class="games-dialog-cancel" type="button">ביטול</button>
    </div>
  </div>
</dialog>

<div id="buttonsContainer">
  <button class="action-btn" id="clockBtn">⏰ שעון מעורר</button>
  <button class="action-btn" id="spotifyBtn">🎵 Spotify</button>
  <button class="action-btn" id="gameBtn">🎮 משחקים</button>
  <button class="action-btn" id="jokeBtn">😂 בדיחה</button>
</div>

<div id="inputContainer">
  <input type="text" id="userInput" placeholder="כתבו הודעה..."/>
  <button id="sendBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
  <button id="themeToggle">🌓</button>
</div>

<script>
// ── Elements ──────────────────────────────────────────────
const chatContainer = document.getElementById('chatContainer');
const clockContainer = document.getElementById('clockContainer');
const userInput     = document.getElementById('userInput');
const sendBtn       = document.getElementById('sendBtn');
const themeToggle   = document.getElementById('themeToggle');
const clockBtn      = document.getElementById('clockBtn');
const spotifyBtn    = document.getElementById('spotifyBtn');
const gameBtn       = document.getElementById('gameBtn');
const jokeBtn       = document.getElementById('jokeBtn');
const gamesDialog   = document.getElementById('gamesDialog');
const gamesDialogList = document.getElementById('gamesDialogList');
const gamesDialogText = document.getElementById('gamesDialogText');
const closeGamesDialogBtn = document.getElementById('closeGamesDialogBtn');
const cancelGamesDialogBtn = document.getElementById('cancelGamesDialogBtn');
const canvas        = document.getElementById('canvas');
const ctx           = canvas.getContext('2d');

// ── Canvas resize ─────────────────────────────────────────
function resizeCanvas(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Floating particles ────────────────────────────────────
const COLORS = ['#0b93f6','#00d4ff','#7b8aff','#00ffcc','#ff7eb3'];
const sparks  = [];
const TOTAL   = 55;

function newSpark(startAtBottom = false){
  return {
    x     : Math.random() * canvas.width,
    y     : startAtBottom ? canvas.height + 10 : Math.random() * canvas.height,
    r     : Math.random() * 1.8 + 0.8,
    speed : Math.random() * 0.35 + 0.12,
    alpha : Math.random() * 0.2 + 0.04,
    color : COLORS[Math.floor(Math.random() * COLORS.length)]
  };
}
for(let i = 0; i < TOTAL; i++) sparks.push(newSpark(false));

function animateParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for(const s of sparks){
    s.y -= s.speed;
    if(s.y < -10) Object.assign(s, newSpark(true));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.alpha;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ── Burst effect when sending ─────────────────────────────
function burst(x, y, color){
  for(let i = 0; i < 12; i++){
    sparks.push({
      x, y,
      r     : Math.random() * 3 + 1.5,
      speed : Math.random() * 3 + 1.5,
      alpha : 0.85,
      color
    });
  }
}

// ── Theme ─────────────────────────────────────────────────
themeToggle.addEventListener('click', () => document.body.classList.toggle('light'));

// ── Ripple on send button ─────────────────────────────────
function addRipple(){
  const r = document.createElement('span');
  r.className = 'ripple';
  sendBtn.appendChild(r);
  setTimeout(() => r.remove(), 500);
}

// ── Helpers ───────────────────────────────────────────────
function scrollBottom(){
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function appendMsg(text, cls){
  const d = document.createElement('div');
  d.className = 'message ' + cls;
  d.textContent = text;
  chatContainer.appendChild(d);
  scrollBottom();
  return d;
}

function showTyping(){
  const d = document.createElement('div');
  d.className = 'message bot';
  d.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chatContainer.appendChild(d);
  scrollBottom();
  return d;
}

// ── Ripple on send button ─────────────────────────────────
function addRipple(){
  const r = document.createElement('span');
  r.className = 'ripple';
  sendBtn.appendChild(r);
  setTimeout(() => r.remove(), 500);
}

// ── Helpers ───────────────────────────────────────────────
function scrollBottom(){
  let container = document.getElementById('chatContainer');
  if(container) container.scrollTop = container.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────
async function doSend(){
  const text = userInput.value.trim();
  console.log('doSend called with text:', text);

  if(!text) {
    console.log('Empty text, returning');
    return;
  }

  // Add user message to chat
  console.log('Adding user message');
  addMessage(text, true);

  // burst from send button position
  const rect = sendBtn.getBoundingClientRect();
  burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#0b93f6');
  addRipple();

  userInput.value = '';
  sendBtn.disabled = true;

  // Show typing indicator
  console.log('Showing typing indicator');
  showTypingIndicator();

  // Send message to C# backend
  console.log('Sending to C# backend');
  if(window.chrome && window.chrome.webview){
    window.chrome.webview.postMessage({type: 'userMessage', text: text});
  }

  // Don't enable send button yet - wait for response from C#
  // sendBtn.disabled = false;
  // userInput.focus();
}

// ── Add Message (from C# or user) ─────────────────────────
function addMessage(text, isUser = false){
  console.log('addMessage called:', text, 'isUser:', isUser);

  // Ensure chatContainer exists
  let container = document.getElementById('chatContainer');
  if(!container){
    console.error('chatContainer not found!');
    return null;
  }

  const d = document.createElement('div');
  d.className = 'message ' + (isUser ? 'user' : 'bot');
  d.textContent = text;
  d.style.display = 'block'; // Ensure it's visible
  container.appendChild(d);

  console.log('Message added, container has', container.children.length, 'children');

  // Scroll to bottom
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 10);

  return d;
}

// ── Show Typing Indicator ────────────────────────────────
function showTypingIndicator(){
  console.log('showTypingIndicator called');

  let container = document.getElementById('chatContainer');
  if(!container){
    console.error('chatContainer not found!');
    return null;
  }

  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot typing-indicator';
  typingDiv.id = 'typing-indicator';

  // Create three dots
  typingDiv.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

  container.appendChild(typingDiv);

  // Scroll to bottom
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 10);

  return typingDiv;
}

// ── Hide Typing Indicator ────────────────────────────────
function hideTypingIndicator(){
  console.log('hideTypingIndicator called');

  const typingDiv = document.getElementById('typing-indicator');
  if(typingDiv){
    typingDiv.remove();
  }
}

function closeGamesDialog(){
  if(gamesDialog.open){
    gamesDialog.close();
  }
}

function normalizeGamesPayload(payload){
  let list = [];

  if(Array.isArray(payload)){
    list = payload;
  } else if(payload && Array.isArray(payload.games)){
    list = payload.games;
  } else if(payload && Array.isArray(payload.items)){
    list = payload.items;
  } else if(payload && typeof payload.games === 'string'){
    list = payload.games.split(/\r?\n|,/);
  } else if(typeof payload === 'string'){
    list = payload.split(/\r?\n|,/);
  }

  return list
    .map((item, index) => {
      if(typeof item === 'string'){
        const label = item.trim();
        if(!label) return null;
        return {
          id: 'game-' + index,
          label,
          description: ''
        };
      }

      if(item && typeof item === 'object'){
        const label = String(item.label || item.name || item.title || item.game || '').trim();
        if(!label) return null;
        return {
          id: String(item.id || item.key || item.name || ('game-' + index)),
          label,
          description: String(item.description || item.summary || '').trim()
        };
      }

      return null;
    })
    .filter(Boolean);
}

function pickGame(game){
  closeGamesDialog();
  addMessage('בחרתי את ' + game.label, true);

  if(window.chrome && window.chrome.webview){
    window.chrome.webview.postMessage({
      type: 'launchGame',
      id: game.id,
      game: game.label,
      name: game.label
    });
  }
}

function showGamesDialog(payload){
  console.log('showGamesDialog called', payload);
  hideTypingIndicator();

  const games = normalizeGamesPayload(payload);
  gamesDialogList.innerHTML = '';

  if(!games.length){
    addMessage('לא מצאתי משחקים זמינים כרגע.', false);
    return;
  }

  gamesDialogText.textContent = 'בחרו משחק מהרשימה.';

  games.forEach((game) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'game-option-btn';

    const name = document.createElement('span');
    name.className = 'game-option-name';
    name.textContent = game.label;
    btn.appendChild(name);

    if(game.description){
      const desc = document.createElement('span');
      desc.className = 'game-option-desc';
      desc.textContent = game.description;
      btn.appendChild(desc);
    }

    btn.addEventListener('click', () => pickGame(game));
    gamesDialogList.appendChild(btn);
  });

  if(typeof gamesDialog.showModal === 'function'){
    if(gamesDialog.open) gamesDialog.close();
    gamesDialog.showModal();
  } else {
    gamesDialog.setAttribute('open', 'open');
  }
}

closeGamesDialogBtn.addEventListener('click', closeGamesDialog);
cancelGamesDialogBtn.addEventListener('click', closeGamesDialog);

sendBtn.addEventListener('click', () => {
  console.log('Send button clicked');
  doSend();
});

userInput.addEventListener('keydown', (e) => { 
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    console.log('Enter key pressed');
    doSend();
  }
});

// ── Action Button Handlers ───────────────────────────────
clockBtn.addEventListener('click', () => {
  console.log('Clock button clicked');
  window.location.href = 'clock.html';
});

spotifyBtn.addEventListener('click', () => {
  console.log('Spotify button clicked');
  addMessage('בא לי לשמוע מוזיקה', true);
  if(window.chrome && window.chrome.webview){
    window.chrome.webview.postMessage({type: 'launchApp', app: 'spotify'});
  }
});

gameBtn.addEventListener('click', () => {
  console.log('Game button clicked');
  addMessage('בא לי לשחק', true);
  showTypingIndicator();
  if(window.chrome && window.chrome.webview){
    window.chrome.webview.postMessage({type: 'askGames'});
  }
});

jokeBtn.addEventListener('click', () => {
  console.log('Joke button clicked');
  addMessage('אתה יכול להגיד לי בדיחה?', true);
  showTypingIndicator();
  if(window.chrome && window.chrome.webview){
    window.chrome.webview.postMessage({type: 'getJoke'});
  }
});

// ──────────────────────────── CLOCK FUNCTIONALITY ──────────────────────────────

// Clock toggle function
function toggleClockView(){
  const chatDiv=document.getElementById('chatContainer');
  const clockDiv=document.getElementById('clockContainer');
  const inputDiv=document.getElementById('inputContainer');
  const btnDiv=document.getElementById('buttonsContainer');

  if(clockDiv.style.display==='none' || clockDiv.innerHTML===''){
    if(clockDiv.innerHTML==='') initializeClock();
    chatDiv.style.display='none';
    inputDiv.style.display='none';
    btnDiv.style.display='none';
    clockDiv.style.display='block';
    clockDiv.style.flex='1';
    clockDiv.style.overflow='auto';
  } else {
    chatDiv.style.display='flex';
    inputDiv.style.display='flex';
    btnDiv.style.display='flex';
    clockDiv.style.display='none';
  }
}   

// Initialize clock
function initializeClock(){
  const clockDiv=document.getElementById('clockContainer');

  // Include basic clock HTML structure
  clockDiv.innerHTML=`
    <div id="clockApp" style="display:flex;flex-direction:column;align-items:center;gap:24px;padding:28px 16px 20px;width:100%;height:100%;overflow-y:auto;">
      <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
        <button id="backBtn" style="width:38px;height:38px;border-radius:50%;border:1px solid #444;background:transparent;color:#e8eaed;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">⬅</button>
        <button id="themeToggleClock" style="width:38px;height:38px;border-radius:50%;border:1px solid #444;background:transparent;color:#e8eaed;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">🌓</button>
      </div>
      <div id="clockFace" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:28px 32px;border-radius:24px;border:1px solid #383838;background:#2a2a2e;width:100%;">
        <div id="clock" style="font-size:64px;font-weight:200;letter-spacing:-2px;">00:00:00</div>
        <div id=" date" style="font-size:14px;color:#9aa0a6;"></div>
      </div>
      <div id="alertBar" style="width:100%;border-radius:20px;padding:18px 24px;border:1px solid #0b93f6;background:#1a1f2e;display:none;flex-direction:column;gap:12px;align-items:center;">
        <div id="alertMsg" style="font-size:17px;font-weight:500;color:#e8eaed;">⏰ השעון מצלצל!</div>
        <div id="alertTime" style="font-size:28px;font-weight:200;color:#0b93f6;"></div>
        <div style="display:flex;gap:10px;width:100%;">
          <button id="snoozeBtn" style="flex:1;padding:12px;border-radius:14px;border:none;background:#303134;color:#e8eaed;cursor:pointer;">נודניק 5 דק'</button>
          <button id="dismissBtn" style="flex:1;padding:12px;border-radius:14px;border:none;background:#0b93f6;color:#fff;cursor:pointer;">כיבוי</button>
        </div>
      </div>
      <div id="setCard" style="width:100%;border-radius:20px;padding:20px 24px;border:1px solid #383838;background:#2a2a2e;display:flex;flex-direction:column;gap:16px;">
        <span style="font-size:12px;color:#9aa0a6;">שעון חדש</span>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;">
          <input id="hourInput" type="number" min="0" max="23" value="07" style="font-size:32px;width:64px;border:none;background:transparent;color:#e8eaed;text-align:center;border-bottom:1px solid #555;outline:none;" />
          <span style="font-size:28px;color:#555;">:</span>
          <input id="minInput" type="number" min="0" max="59" value="00" style="font-size:32px;width:64px;border:none;background:transparent;color:#e8eaed;text-align:center;border-bottom:1px solid #555;outline:none;" />
        </div>
        <input id="alarmLabel" type="text" placeholder="תווית..." maxlength="40" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid #444;background:#303134;color:#e8eaed;outline:none;" />
        <button id="setBtn" style="width:100%;padding:14px;border-radius:25px;border:none;background:#0b93f6;color:#fff;cursor:pointer;font-weight:500;">שמירת שעון</button>
      </div>
      <div id="alarmList" style="width:100%;display:flex;flex-direction:column;gap:10px;"></div>
    </div>`;

  // Initialize clock functionality
  initializeClockLogic();
}

function initializeClockLogic(){
  const hourInput = document.getElementById('hourInput');
  const minInput = document.getElementById('minInput');
  const backBtn = document.getElementById('backBtn');

  if(hourInput){
    hourInput.addEventListener('blur', function(){
      let v = parseInt(this.value, 10);
      if(isNaN(v)) v = 0;
      this.value = Math.min(23, Math.max(0, v));
    });
  }

  if(minInput){
    minInput.addEventListener('blur', function(){
      let v = parseInt(this.value, 10);
      if(isNaN(v)) v = 0;
      this.value = Math.min(59, Math.max(0, v));
    });
  }

  if(backBtn){
    backBtn.addEventListener('click', toggleClockView);
  }

  // Clock tick function
  function updateClock(){
    const now = new Date();
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');

    if(clockEl) clockEl.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    if(dateEl) {
      const days=['יום ראשון','יום שני','יום שלישי','יום רביעי','יום חמישי','יום שישי','יום שבת'];
      const months=['ינו׳','פבר׳','מרץ','אפר׳','מאי','יוני','יולי','אוג׳','ספט׳','אוק׳','נוב׳','דצמ׳'];
      dateEl.textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
    }
  }

  function pad(n){ return String(n).padStart(2,'0'); }

  updateClock();
  setInterval(updateClock, 1000);

  // Set alarm handler
  const setBtn = document.getElementById('setBtn');
  if(setBtn){
    setBtn.addEventListener('click', function(){
      const h = parseInt(document.getElementById('hourInput').value, 10);
      const m = parseInt(document.getElementById('minInput').value, 10);
      if(isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59){
        alert('יש להזין שעה תקינה.');
        return;
      }
      const label = document.getElementById('alarmLabel').value.trim() || 'שעון מעורר';
      alert('השעון הוגדר ל-' + pad(h) + ':' + pad(m) + ' - ' + label);
      document.getElementById('alarmLabel').value = '';
    });
  }
}

// WebView2 message handler for clock
if(window.chrome && window.chrome.webview){
  const originalListener = window.chrome.webview.addEventListener;
  window.chrome.webview.addEventListener('message', e => {
    const d = e.data;
    if(
      d &&
      (
        Array.isArray(d) ||
        d.type === 'gamesList' ||
        d.type === 'showGamesDialog' ||
        d.type === 'askGamesResult' ||
        Array.isArray(d.games) ||
        Array.isArray(d.items) ||
        Array.isArray(d.list)
      )
    ){
      showGamesDialog(d.games || d.items || d.list || d);
      return;
    }

    if(d.type === 'setAlarm' && d.hour != null && d.minute != null){
      setTimeout(() => {
        const hourInput = document.getElementById('hourInput');
        const minInput = document.getElementById('minInput');
        const alarmLabel = document.getElementById('alarmLabel');
        const setBtn = document.getElementById('setBtn');

        if(!hourInput){
          initializeClock();
          setTimeout(() => {
            const hourInput = document.getElementById('hourInput');
            const minInput = document.getElementById('minInput');
            const alarmLabel = document.getElementById('alarmLabel');
            const setBtn = document.getElementById('setBtn');
            if(hourInput && minInput && setBtn){
              hourInput.value = String(d.hour).padStart(2, '0');
              minInput.value = String(d.minute).padStart(2, '0');
              if(d.label && alarmLabel) alarmLabel.value = d.label;
              toggleClockView();
              setBtn.click();
            }
          }, 100);
        } else {
          hourInput.value = String(d.hour).padStart(2, '0');
          minInput.value = String(d.minute).padStart(2, '0');
          if(d.label && alarmLabel) alarmLabel.value = d.label;
          toggleClockView();
          setBtn.click();
        }
      }, 50);
    }
  });
}

window.showGamesDialog = showGamesDialog;
</script>
