<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ניהול שעון מעורר</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-1: #07111f;
            --bg-2: #10233b;
            --panel: rgba(10, 19, 34, 0.86);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #eff5ff;
            --muted: #a8bad3;
            --accent: #58b7ff;
            --accent-strong: #1991f2;
            --danger: #ff6f6f;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, rgba(88, 183, 255, 0.18), transparent 40%), linear-gradient(160deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            padding: 24px 16px 40px;
        }

        .app {
            width: min(760px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .hero {
            text-align: center;
            padding: 32px 24px;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(3rem, 11vw, 5.5rem);
            font-weight: 200;
            letter-spacing: -0.08em;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        #liveDate {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .section-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }

        .topbar {
            display: flex;
            justify-content: flex-start;
        }

        .section-copy {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .alarm-form {
            display: grid;
            gap: 16px;
        }

        .time-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: end;
        }

        .field {
            display: grid;
            gap: 8px;
        }

            .field span {
                color: var(--muted);
                font-size: 0.9rem;
            }

        input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            padding: 14px 16px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }

            input:focus {
                border-color: var(--accent);
                background: rgba(255, 255, 255, 0.1);
                transform: translateY(-1px);
            }

        .colon {
            font-size: 2rem;
            color: var(--muted);
            align-self: center;
            padding-bottom: 10px;
        }

        button {
            border: none;
            border-radius: 999px;
            font: inherit;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

            button:hover {
                transform: translateY(-1px);
            }

            button:active {
                transform: translateY(0);
            }

        .primary-btn,
        .ghost-btn,
        .mini-btn {
            padding: 12px 18px;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #04101c;
            font-weight: 700;
        }

        .ghost-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.14);
            white-space: nowrap;
        }

        .status {
            margin-top: 14px;
            color: var(--muted);
            line-height: 1.5;
        }

        .pill,
        .mini-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(88, 183, 255, 0.14);
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .pill {
            min-width: 40px;
            padding: 8px 12px;
        }

        .mini-pill {
            padding: 4px 10px;
        }

        .alarm-list {
            display: grid;
            gap: 12px;
        }

        .alarm-card {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }

            .alarm-card.is-disabled {
                opacity: 0.6;
            }

        .alarm-copy {
            min-width: 0;
        }

        .alarm-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .alarm-time {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: -0.04em;
        }

        .alarm-label {
            margin-top: 5px;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alarm-meta {
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .alarm-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .mini-btn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

            .mini-btn.danger {
                color: var(--danger);
                border-color: rgba(255, 111, 111, 0.35);
            }

        .empty-state {
            margin-top: 10px;
            color: var(--muted);
            text-align: center;
            padding: 8px 0 4px;
        }

        @media (max-width: 680px) {
            .panel {
                padding: 20px;
            }

            .section-row,
            .alarm-card {
                flex-direction: column;
                align-items: stretch;
            }

            .alarm-actions {
                justify-content: stretch;
            }

                .alarm-actions button {
                    width: 100%;
                }
        }

        @media (max-width: 430px) {
            body {
                padding-inline: 12px;
            }

            .time-row {
                grid-template-columns: 1fr;
            }

            .colon {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="topbar">
            <button id="backBtn" class="ghost-btn" type="button">חזרה לצ'אט</button>
        </div>

        <section class="panel hero">
            <p class="eyebrow">שעון מעורר</p>
            <h1 id="liveClock">00:00:00</h1>
            <p id="liveDate">טוען שעה נוכחית...</p>
        </section>

        <section class="panel">
            <div class="section-row">
                <div>
                    <h2 dir="rtl">הגדרת שעון מעורר</h2>
                    <p class="section-copy"></p>
                </div>
            </div>

            <form id="alarmForm" class="alarm-form" novalidate>
                <div class="time-row">
                    <label class="field">
                        <span dir="rtl">שעה</span>
                        <input id="hourInput" type="number" min="0" max="23" value="07" required dir="rtl" />
                    </label>

                    <div class="colon">:</div>

                    <label class="field">
                        <span dir="rtl">דקה</span>
                        <input id="minuteInput" type="number" min="0" max="59" value="00" required dir="rtl" />
                    </label>
                </div>

                <label class="field">
                    <input id="labelInput" type="text" maxlength="40" placeholder="שם התראה" dir="rtl" />
                </label>

                <button class="primary-btn" type="submit" dir="rtl">ליצור את השעון</button>
            </form>
            <p id="popupStatus" class="status"></p>

        </section>

        <section class="panel">
            <div class="section-row">
                <div>
                    <h2 dir="rtl">שעונים שמורים</h2>
                </div>
                <span id="alarmCount" class="pill">0</span>
            </div>

            <div id="alarmList" class="alarm-list"></div>
            <p id="emptyState" class="empty-state" dir="rtl">אין שעונים שמורים.</p>
        </section>
    </main>

    <script>
        const STORAGE_KEY = "browser-alarm-clock-state-v1";
        const POPUP_NAME = "alarmClockPopup";

        const liveClockEl = document.getElementById("liveClock");
        const liveDateEl = document.getElementById("liveDate");
        const popupStatusEl = document.getElementById("popupStatus");
        const alarmCountEl = document.getElementById("alarmCount");
        const alarmListEl = document.getElementById("alarmList");
        const emptyStateEl = document.getElementById("emptyState");
        const alarmFormEl = document.getElementById("alarmForm");
        const hourInputEl = document.getElementById("hourInput");
        const minuteInputEl = document.getElementById("minuteInput");
        const labelInputEl = document.getElementById("labelInput");
        const backBtnEl = document.getElementById("backBtn");

        let alarms = loadAlarms();
        let popupWindow = null;
        let popupReady = false;

        function makeId() {
            if (window.crypto && typeof window.crypto.randomUUID === "function") {
                return window.crypto.randomUUID();
            }

            return "alarm-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        }

        function pad(value) {
            return String(value).padStart(2, "0");
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatClock(date) {
            return date.toLocaleTimeString("he-IL", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false
            });
        }

        function formatDate(date) {
            return date.toLocaleDateString("he-IL", {
                weekday: "long",
                month: "long",
                day: "numeric",
                year: "numeric"
            });
        }

        function formatAlarmTime(alarm) {
            return pad(alarm.hour) + ":" + pad(alarm.minute);
        }

        function formatDueTime(timestamp) {
            const target = new Date(timestamp);
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(now.getDate() + 1);

            let dayLabel = target.toLocaleDateString("he-IL", {
                weekday: "short",
                month: "short",
                day: "numeric"
            });

            if (target.toDateString() === now.toDateString()) {
                dayLabel = "היום";
            } else if (target.toDateString() === tomorrow.toDateString()) {
                dayLabel = "מחר";
            }

            const timeLabel = target.toLocaleTimeString("he-IL", {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            });

            return dayLabel + " בשעה " + timeLabel;
        }

        function getNextTriggerAt(hour, minute) {
            const now = new Date();
            const target = new Date(now);
            target.setHours(hour, minute, 0, 0);

            if (target <= now) {
                target.setDate(target.getDate() + 1);
            }

            return target.getTime();
        }

        function normalizeAlarms(source) {
            const now = Date.now();

            return (Array.isArray(source) ? source : [])
                .filter((alarm) => alarm && typeof alarm === "object")
                .map((alarm) => {
                    const normalized = {
                        id: String(alarm.id || makeId()),
                        hour: Number(alarm.hour),
                        minute: Number(alarm.minute),
                        label: String(alarm.label || "שעון מעורר"),
                        triggerAt: Number(alarm.triggerAt),
                        createdAt: Number(alarm.createdAt || Date.now()),
                        enabled: alarm.enabled !== false
                    };

                    if (!Number.isInteger(normalized.hour) || normalized.hour < 0 || normalized.hour > 23) {
                        return null;
                    }

                    if (!Number.isInteger(normalized.minute) || normalized.minute < 0 || normalized.minute > 59) {
                        return null;
                    }

                    if (!Number.isFinite(normalized.triggerAt)) {
                        normalized.triggerAt = getNextTriggerAt(normalized.hour, normalized.minute);
                    }

                    if (!Number.isFinite(normalized.createdAt) || normalized.createdAt > normalized.triggerAt) {
                        normalized.createdAt = Math.min(Date.now(), normalized.triggerAt);
                    }

                    if (normalized.enabled && normalized.triggerAt <= now) {
                        normalized.enabled = false;
                    }

                    return normalized;
                })
                .filter(Boolean)
                .sort((left, right) => left.triggerAt - right.triggerAt);
        }

        function loadAlarms() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);

                if (!raw) {
                    return [];
                }

                return normalizeAlarms(JSON.parse(raw));
            } catch (error) {
                return [];
            }
        }

        function saveAlarms() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(alarms));
            } catch (error) {
                return;
            }
        }

        function getEnabledAlarms() {
            return alarms.filter((alarm) => alarm.enabled);
        }

        function getNextEnabledAlarm() {
            return getEnabledAlarms()[0] || null;
        }

        function buildPopupUrl(alarm) {
            const params = new URLSearchParams();

            if (alarm) {
                params.set("id", alarm.id);
                params.set("hour", String(alarm.hour));
                params.set("minute", String(alarm.minute));
                params.set("label", alarm.label);
                params.set("triggerAt", String(alarm.triggerAt));
                params.set("createdAt", String(alarm.createdAt));
            }

            const query = params.toString();
            return "clock-popup.html" + (query ? "?" + query : "");
        }

        function ensurePopup(forceOpen) {
            const nextAlarm = getNextEnabledAlarm();

            if (!nextAlarm) {
                return null;
            }

            if (popupWindow && !popupWindow.closed) {
                return popupWindow;
            }

            popupReady = false;
            popupWindow = null;

            if (!forceOpen) {
                return null;
            }

            popupWindow = window.open(
                buildPopupUrl(nextAlarm),
                POPUP_NAME,
                "popup=yes,width=430,height=720,resizable=yes"
            );

            if (!popupWindow) {
                popupStatusEl.textContent = "השעון נשמר, אבל הדפדפן חסם את החלון הקופץ. צריך לאפשר חלונות קופצים לעמוד הזה.";
                return null;
            }

            return popupWindow;
        }

        function closePopupWindow() {
            if (popupWindow && !popupWindow.closed) {
                popupWindow.close();
            }

            popupWindow = null;
            popupReady = false;
        }

        function sendStateToPopup() {
            if (!popupWindow || popupWindow.closed) {
                popupWindow = null;
                popupReady = false;
                renderPopupStatus();
                return;
            }

            popupWindow.postMessage(
                {
                    type: "syncState",
                    alarm: getNextEnabledAlarm()
                },
                "*"
            );
        }

        function schedulePopupSync() {
            window.setTimeout(sendStateToPopup, 150);
            window.setTimeout(sendStateToPopup, 500);
        }

        function renderPopupStatus() {
            const nextAlarm = getNextEnabledAlarm();
            const popupOpen = popupWindow && !popupWindow.closed;

            if (!popupOpen) {
                popupStatusEl.textContent = nextAlarm
                    ? "השעון הבא מוגדר ל-" + formatDueTime(nextAlarm.triggerAt) + ". החלון הקופץ ייפתח אוטומטית כשצריך."
                    : "החלון הקופץ ייפתח אוטומטית כשתשמור שעון.";
                return;
            }

            if (!nextAlarm) {
                popupStatusEl.textContent = popupReady
                    ? "חלון השעון פתוח ומחכה לשעון הבא."
                    : "חלון השעון נפתח.";
                return;
            }

            popupStatusEl.textContent = popupReady
                ? "חלון השעון מסונכרן עם " + nextAlarm.label + " ל-" + formatDueTime(nextAlarm.triggerAt) + "."
                : "חלון השעון נפתח עבור " + nextAlarm.label + ".";
        }

        function renderAlarms() {
            const nextAlarm = getNextEnabledAlarm();

            alarmCountEl.textContent = String(alarms.length);
            alarmListEl.innerHTML = "";
            emptyStateEl.hidden = alarms.length > 0;

            alarms.forEach((alarm) => {
                const card = document.createElement("article");
                card.className = "alarm-card" + (alarm.enabled ? "" : " is-disabled");

                const badge = nextAlarm && nextAlarm.id === alarm.id ? '<span class="mini-pill">הבא</span>' : "";
                const metaLabel = alarm.enabled
                    ? "מתוזמן ל-" + formatDueTime(alarm.triggerAt)
                    : alarm.triggerAt <= Date.now()
                        ? "עבר"
                        : "מושבת";

                card.innerHTML = `
                        <div class="alarm-copy">
                            <div class="alarm-heading">
                                <div class="alarm-time">${formatAlarmTime(alarm)}</div>
                                ${badge}
                            </div>
                            <div class="alarm-label">${escapeHtml(alarm.label)}</div>
                            <div class="alarm-meta">${metaLabel}</div>
                        </div>
                        <div class="alarm-actions">
                            <button class="mini-btn" type="button" data-action="toggle" data-id="${alarm.id}">
                                ${alarm.enabled ? "כיבוי" : "הפעלה"}
                            </button>
                            <button class="mini-btn danger" type="button" data-action="delete" data-id="${alarm.id}">
                                מחיקה
                            </button>
                        </div>
                    `;

                alarmListEl.appendChild(card);
            });

            renderPopupStatus();
        }

        function persistAndRefresh() {
            alarms = normalizeAlarms(alarms);
            saveAlarms();
            renderAlarms();

            if (!getNextEnabledAlarm()) {
                closePopupWindow();
                renderPopupStatus();
                return;
            }

            if (popupWindow && !popupWindow.closed) {
                sendStateToPopup();
            }
        }

        function createAlarm(hour, minute, label) {
            const now = Date.now();
            alarms.push({
                id: makeId(),
                hour,
                minute,
                label,
                triggerAt: getNextTriggerAt(hour, minute),
                createdAt: now,
                enabled: true
            });

            persistAndRefresh();
        }

        function clearForm() {
            labelInputEl.value = "";
        }

        function clampInputValue(input, maxValue) {
            const value = Number(input.value);

            if (!Number.isInteger(value)) {
                input.value = "00";
                return;
            }

            input.value = pad(Math.min(maxValue, Math.max(0, value)));
        }

        function updateLiveClock() {
            const now = new Date();
            liveClockEl.textContent = formatClock(now);
            liveDateEl.textContent = formatDate(now);
        }

        function receiveExternalAlarm(data) {
            if (!data || typeof data !== "object") {
                return;
            }

            const hour = Number(data.hour);
            const minute = Number(data.minute);

            if (!Number.isInteger(hour) || hour < 0 || hour > 23 || !Number.isInteger(minute) || minute < 0 || minute > 59) {
                return;
            }

            const label = String(data.label || "שעון מעורר");

            hourInputEl.value = pad(hour);
            minuteInputEl.value = pad(minute);
            labelInputEl.value = label;

            createAlarm(hour, minute, label);

            const popup = ensurePopup(true);
            if (popup) {
                popup.focus();
                schedulePopupSync();
            }

            clearForm();
            renderPopupStatus();
        }

        function handleFormSubmit(event) {
            event.preventDefault();

            const hour = Number(hourInputEl.value);
            const minute = Number(minuteInputEl.value);

            if (!Number.isInteger(hour) || hour < 0 || hour > 23 || !Number.isInteger(minute) || minute < 0 || minute > 59) {
                window.alert("יש להזין שעה תקינה בין 0 ל-23 ודקה תקינה בין 0 ל-59.");
                return;
            }

            const label = labelInputEl.value.trim() || "שעון מעורר";

            createAlarm(hour, minute, label);

            const popup = ensurePopup(true);
            if (popup) {
                popup.focus();
                schedulePopupSync();
            }

            clearForm();
            renderPopupStatus();
        }

        window.receiveExternalAlarm = receiveExternalAlarm;

        alarmFormEl.addEventListener("submit", handleFormSubmit);

        backBtnEl.addEventListener("click", () => {
            window.location.href = "chat.html";
        });

        hourInputEl.addEventListener("blur", () => {
            clampInputValue(hourInputEl, 23);
        });

        minuteInputEl.addEventListener("blur", () => {
            clampInputValue(minuteInputEl, 59);
        });

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener("message", (event) => {
                const data = event.data;

                if (data && data.type === "setAlarm") {
                    receiveExternalAlarm(data);
                }
            });
        }

        alarmListEl.addEventListener("click", (event) => {
            const button = event.target.closest("button");

            if (!button) {
                return;
            }

            const alarmId = button.dataset.id;
            const action = button.dataset.action;
            const targetAlarm = alarms.find((alarm) => alarm.id === alarmId);

            if (!targetAlarm) {
                return;
            }

            if (action === "toggle") {
                targetAlarm.enabled = !targetAlarm.enabled;
            }

            if (action === "delete") {
                alarms = alarms.filter((alarm) => alarm.id !== alarmId);
            }

            persistAndRefresh();
        });

        window.addEventListener("message", (event) => {
            const data = event.data;

            if (!data || typeof data !== "object") {
                return;
            }

            if (data.type === "popupReady") {
                popupWindow = event.source;
                popupReady = true;
                sendStateToPopup();
                renderPopupStatus();
                return;
            }

            if (data.type === "popupClosed") {
                popupReady = false;
                popupWindow = null;
                renderPopupStatus();
                return;
            }

            if (data.type === "dismissAlarm" || data.type === "cancelAlarm") {
                const alarm = alarms.find((item) => item.id === data.alarmId);

                if (alarm) {
                    alarm.enabled = false;
                    persistAndRefresh();
                }

                return;
            }

            if (data.type === "snoozeAlarm" && data.alarm) {
                const original = alarms.find((item) => item.id === data.alarmId);

                if (original) {
                    original.enabled = false;
                }

                const snoozedTriggerAt = Number(data.alarm.triggerAt);

                if (!Number.isFinite(snoozedTriggerAt)) {
                    persistAndRefresh();
                    return;
                }

                const snoozeDate = new Date(snoozedTriggerAt);

                alarms.push({
                    id: String(data.alarm.id || makeId()),
                    hour: snoozeDate.getHours(),
                    minute: snoozeDate.getMinutes(),
                    label: String(data.alarm.label || (original ? original.label : "שעון מעורר")),
                    triggerAt: snoozedTriggerAt,
                    createdAt: Number(data.alarm.createdAt || Date.now()),
                    enabled: true
                });

                persistAndRefresh();
            }
        });

        window.setInterval(() => {
            if (popupWindow && popupWindow.closed) {
                popupWindow = null;
                popupReady = false;
                renderPopupStatus();
            }
        }, 1000);

        renderAlarms();
        updateLiveClock();
        window.setInterval(updateLiveClock, 1000);
    </script>
</body>
</html>
